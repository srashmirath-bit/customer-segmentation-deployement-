apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-segmentation-app
  labels:
    app: customer-segmentation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-segmentation
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: customer-segmentation
    spec:
      containers:
      - name: customer-segmentation-app
        image: 650708167965.dkr.ecr.ap-south-1.amazonaws.com/customer-segmentation:latest
        ports:
        - containerPort: 8501
        - containerPort: 8000
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: aws-secret-access-key
        - name: AWS_REGION
          value: "ap-south-1"
        - name: S3_BUCKET
          value: "customer-segmentation-2026"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: customer-segmentation-service
spec:
  selector:
    app: customer-segmentation
  type: LoadBalancer
  ports:
  - name: streamlit
    port: 8501
    targetPort: 8501
  - name: fastapi
    port: 8000
    targetPort: 8000
