name: Customer Segmentation — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:       ap-south-1
  ECR_REPOSITORY:   customer-segmentation
  EKS_CLUSTER_NAME: customer-segmentation-cluster
  S3_BUCKET:        customer-segmentation-2026

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region:            ${{ env.AWS_REGION }}

    - id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG:    ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Deploy to EKS
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        sed -i "s/ACCOUNT_ID/$ACCOUNT_ID/g" k8s/deployment.yml
        kubectl create secret generic aws-secrets \
          --from-literal=aws-access-key-id=${{ secrets.AWS_ACCESS_KEY_ID }} \
          --from-literal=aws-secret-access-key=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f k8s/deployment.yml
        kubectl rollout status deployment/customer-segmentation-app --timeout=300s
        echo "App URL:"
        kubectl get service customer-segmentation-service
